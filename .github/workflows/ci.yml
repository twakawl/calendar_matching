name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      GOOGLE_CLIENT_ID: dummy.apps.googleusercontent.com
      GOOGLE_CLIENT_SECRET: dummy-client-secret
      ENCRYPTION_KEY: 8OsZ5n0JjEqCZxHGThWLhe9pmqNOMpCVgLZzITbMi8M=
      DATABASE_URL: sqlite:///./calendar.db
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Create CI environment file
        run: |
          cat > .env <<EOF_ENV
          GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
          GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
          ENCRYPTION_KEY=${ENCRYPTION_KEY}
          DATABASE_URL=${DATABASE_URL}
          EOF_ENV

      - name: Install dependencies
        run: uv sync

      - name: Verify setup
        run: uv run python tests/test_verify_setup.py

      - name: Run unit tests
        run: uv run python -m unittest tests.test_matching_options tests.test_deployment_config

      - name: Compile Python sources
        run: uv run python -m py_compile app.py matching.py
