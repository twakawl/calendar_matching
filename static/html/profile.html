<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Profile · Calendar Matching</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" href="/static/css/style.css"></head>
<body data-requires-auth="true"><div id="health" title="API health"></div><nav class="navbar navbar-expand-lg bg-white border-bottom sticky-top"><div class="container"><a class="navbar-brand fw-bold" href="/">Calendar Matching</a><div class="ms-auto d-flex gap-2"><a class="btn btn-outline-primary" href="/dashboard">Dashboard</a><a class="btn btn-outline-primary" href="/friends">Friends</a><a class="btn btn-primary" href="/requests/new">New request</a></div></div></nav>
<main class="container py-5"><div class="row g-4"><div class="col-lg-5"><div class="card rounded-5 shadow-sm"><div class="card-body p-4"><p class="text-uppercase small fw-semibold text-primary mb-1">Personal profile</p><h1 class="h3 fw-bold">Your profile</h1><div class="mb-3"><label class="form-label" for="profileDisplayName">Display name</label><input id="profileDisplayName" class="form-control"></div><div class="mb-3"><label class="form-label" for="profilePhone">Phone number</label><input id="profilePhone" class="form-control" type="tel" placeholder="+31 6 ..."></div><div class="mb-3"><label class="form-label" for="profileTimezone">Timezone preference</label><input id="profileTimezone" class="form-control" placeholder="Europe/Amsterdam"></div><div class="mb-3"><label class="form-label" for="profileLinkedCalendar">Linked calendar</label><select id="profileLinkedCalendar" class="form-select"><option value="">Use primary connected calendar</option><option value="a">Google Calendar slot A</option><option value="b">Google Calendar slot B</option></select></div><button id="saveProfileBtn" class="btn btn-primary w-100" type="button">Save profile</button><div id="profileStatus" class="small mt-3" aria-live="polite"></div></div></div></div><div class="col-lg-7"><div class="card rounded-5 shadow-sm"><div class="card-body p-4"><div class="d-flex justify-content-between align-items-start gap-3"><div><p class="text-uppercase small fw-semibold text-primary mb-1">Time presets</p><h2 class="h4 fw-bold">Order and customize presets</h2><p class="text-secondary">Presets are shown in this order on meeting requests. Standard presets are preloaded and custom presets can be added.</p></div><button id="addPresetBtn" class="btn btn-outline-primary" type="button">Add preset</button></div><div id="presetList" class="vstack gap-3 mt-3"></div></div></div></div></div></main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script><script src="/static/js/app.js"></script></body></html>
