<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Friends · Calendar Matching</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" href="/static/css/style.css"></head>
<body data-requires-auth="true"><div id="health" title="API health"></div><nav class="navbar navbar-expand-lg bg-white border-bottom sticky-top"><div class="container"><a class="navbar-brand fw-bold" href="/">Calendar Matching</a><div class="ms-auto d-flex gap-2"><a class="btn btn-outline-primary" href="/profile">Profile</a><a class="btn btn-outline-primary" href="/dashboard">Dashboard</a><a class="btn btn-primary" href="/requests/new">New request</a></div></div></nav>
<main class="container py-5"><div class="row justify-content-center"><div class="col-lg-10"><div class="page-heading mb-4"><p class="text-uppercase small fw-semibold text-primary mb-1">Personal menu</p><h1 class="fw-bold">Friend list</h1><p class="text-secondary">Send friend requests by email and accept incoming requests.</p></div><div class="row g-4"><div class="col-lg-5"><div class="card rounded-5 shadow-sm"><div class="card-body p-4"><h2 class="h4">Invite by email</h2><label class="form-label" for="friendEmail">Email address</label><input id="friendEmail" type="email" class="form-control" placeholder="friend@example.com"><button id="sendFriendBtn" type="button" class="btn btn-primary w-100 mt-3">Send friend request</button><div id="friendStatus" class="small mt-3"></div><hr><h3 class="h6">Import contacts</h3><div class="d-grid gap-2"><button class="btn btn-secondary disabled" type="button" aria-disabled="true">Check Gmail contacts</button><button class="btn btn-secondary disabled" type="button" aria-disabled="true">Check Apple contacts</button><button class="btn btn-secondary disabled" type="button" aria-disabled="true">Check Microsoft contacts</button><button class="btn btn-secondary disabled" type="button" aria-disabled="true">Check Android contacts</button></div></div></div></div><div class="col-lg-7"><div id="friendList" class="vstack gap-3"></div></div></div></div></div></main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script><script src="/static/js/app.js"></script></body></html>
