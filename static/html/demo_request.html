<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Demo request · Calendar Matching</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link rel="stylesheet" href="/static/css/style.css"></head>
<body><div id="health" title="API health"></div><nav class="navbar navbar-expand-lg bg-white border-bottom sticky-top"><div class="container"><a class="navbar-brand fw-bold" href="/">Calendar Matching</a><div class="ms-auto d-flex gap-2"><a class="btn btn-outline-primary" href="/login">Log in</a><a class="btn btn-primary" href="/register">Register</a></div></div></nav>
<main class="container py-5"><div class="row justify-content-center"><div class="col-xl-10"><div class="page-heading text-center mb-4"><p class="text-uppercase small fw-semibold text-primary mb-1">Demo request</p><h1 class="fw-bold">Test matching with two separate demo calendars</h1><p class="text-secondary">These calendars are separate from personal linked calendars but call the same matching logic.</p></div><div class="card rounded-5 shadow-sm mb-4"><div class="card-body p-4"><div class="row g-3"><div class="col-md-3"><label class="form-label" for="demoDuration">Duration</label><select id="demoDuration" class="form-select"><option value="30">30 minutes</option><option value="60">60 minutes</option><option value="90">90 minutes</option></select></div><div class="col-md-3"><label class="form-label" for="demoDate">Date</label><input id="demoDate" type="date" class="form-control" value="2026-06-15"></div><div class="col-md-3"><label class="form-label" for="demoWindowStart">Start</label><input id="demoWindowStart" type="time" class="form-control" value="09:00"></div><div class="col-md-3"><label class="form-label" for="demoWindowEnd">End</label><input id="demoWindowEnd" type="time" class="form-control" value="18:00"></div></div><button id="runDemoBtn" class="btn btn-primary mt-3" type="button">Run demo matching</button></div></div><div id="demoResults" class="row g-3"></div><div class="row g-3 mt-2"><div class="col-md-6"><div class="card"><div class="card-body"><h2 class="h5">Demo calendar A busy registry</h2><pre id="demoBusyA"></pre></div></div></div><div class="col-md-6"><div class="card"><div class="card-body"><h2 class="h5">Demo calendar B busy registry</h2><pre id="demoBusyB"></pre></div></div></div></div></div></div></main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script><script src="/static/js/app.js"></script></body></html>
